name: LiveVoiceTranslator
options:
  bundleIdPrefix: com.jarvisvoicesystem
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: LF2D5C2PRB
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: LiveVoiceTranslator/Config/Debug.xcconfig
  Release: LiveVoiceTranslator/Config/Release.xcconfig

targets:
  JarvisVoiceSystem:
    type: application
    platform: iOS
    sources:
      - path: LiveVoiceTranslator
        excludes:
          - "Config/**"
          - "Resources/**"
          - "Tests/**"
          - "Docs/**"
          - "Sources/**"
    resources:
      - path: LiveVoiceTranslator/Resources
        excludes:
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: LiveVoiceTranslator/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvisvoicesystem.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    entitlements:
      path: LiveVoiceTranslator/LiveVoiceTranslator.entitlements

