name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        run: |
          cd JarvisAndroid
          mkdir -p lib/config
          # Create dummy secrets if they don't exist (needed for compilation)
          if [ ! -f lib/config/secrets.dart ]; then
            echo 'class Secrets { static const String geminiKey = ""; static const String openAIKey = ""; }' > lib/config/secrets.dart
          fi
          flutter pub get

      - name: Build APK
        run: |
          cd JarvisAndroid
          chmod +x android/gradlew
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: JarvisAndroid/build/app/outputs/flutter-apk/app-release.apk
