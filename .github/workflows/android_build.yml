name: JARVIS Android Production Build v1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2' # Соответствует локальному SDK
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: JarvisAndroid01
        run: |
          mkdir -p lib/config
          # Создание мок-файла секретов для успешной компиляции
          if [ ! -f lib/config/secrets.dart ]; then
            echo 'class Secrets { static const String geminiKey = ""; static const String openAIKey = ""; }' > lib/config/secrets.dart
          fi
          flutter pub get

      - name: Build Release APK
        working-directory: JarvisAndroid01
        run: |
          chmod +x android/gradlew
          flutter build apk --release --no-pub --dart-define=IS_CI=true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: JarvisAndroid01/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
