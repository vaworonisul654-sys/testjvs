name: jarvis_voice_system
description: "J.A.R.V.I.S. Android Edition - Professional AI Language Mentor"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  avatar_glow: ^3.0.1
  web_socket_channel: ^2.4.3
  record: ^5.1.0
  audioplayers: ^5.2.1
  flutter_sound: ^9.2.13
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  # OpenAI/Gemini support via HTTP/WS
  http: ^1.1.0
  camera: 0.10.5+9
  path: ^1.9.0

dependency_overrides:
  record_platform_interface: 1.2.0
  record_linux: 0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

